  <path d="M310 52 C310 52 305 58 305 61 C305 63.5 307.2 65.5 310 65.5 C312.8 65.5 315 63.5 315 61 C315 58 310 52 310 52Z" fill="#bb8f5d" opacity="0.3"/>
  <path d="M330 58 C330 58 327 62 327 64 C327 65.7 328.4 67 330 67 C331.6 67 333 65.7 333 64 C333 62 330 58 330 58Z" fill="#bb8f5d" opacity="0.15"/>
